services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 5s
      timeout: 5s
      retries: 10

  directus:
    image: directus/directus:${DIRECTUS_VERSION:-11.15.0}
    ports:
      - "${HOST_PORT:-8056}:8055"
    environment:
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus
      SECRET: perf-test-secret-key
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: AdminPassword123
      CACHE_ENABLED: "false"
      TELEMETRY: "false"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8055/server/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 10s
      retries: 30
